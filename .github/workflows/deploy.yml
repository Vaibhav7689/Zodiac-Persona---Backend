name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    # Removed paths since the repo is now purely the backend

jobs:
  deploy-backend:
    name: Build & Deploy Backend API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Compress backend logic
        run: |
          zip -r backend-build.zip . -x "venv/*" -x "__pycache__/*" -x ".git/*" -x ".github/*"

      - name: Transfer Zip to EC2 via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend-build.zip"
          target: "/tmp/"

      - name: Extract, Install Dependencies, and Restart PM2 Service
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Ensure target backend directory exists
            sudo mkdir -p /var/www/backend 
            sudo chown -R $USER:$USER /var/www/backend
            
            # Install unzip if not present
            sudo apt-get install unzip python3-venv python3-pip -y

            # Extract the compiled backend
            unzip -o /tmp/backend-build.zip -d /var/www/backend
            
            # Cleanup zip from the server
            rm /tmp/backend-build.zip
            
            # Move to root backend
            cd /var/www/backend
            
            # Manage python virtual environment
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Activate and sync PIP requirements
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Make sure PM2 is installed globally via Node
            if ! command -v pm2 &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs
              sudo npm install -g pm2
            fi

            # Manage PM2 Process Wrapper (ignoring errors if not exists)
            pm2 delete zodiac_api || true
            
            # Boot Uvicorn Server over PM2 using the VENV python executable inside PM2 config
            pm2 start "venv/bin/uvicorn api:app --host 0.0.0.0 --port 8000" --name zodiac_api
            pm2 save
            
            echo "Backend successfully spun up using Python VENV + PM2!"
